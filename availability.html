<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강사 일정 확인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f6fa; min-height: 100vh; }

  /* Header */
  .header { background: #fff; padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; user-select: none; }
  .header-info h1 { font-size: 16px; font-weight: 700; color: #222; }
  .header-info p { font-size: 12px; color: #888; margin-top: 2px; }

  /* Calendar nav */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 8px; }
  .cal-nav h2 { font-size: 18px; font-weight: 700; color: #222; }
  .nav-btn { background: none; border: 1px solid #ddd; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: #555; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { background: #f0f0f0; }

  /* Legend */
  .legend { display: flex; gap: 12px; padding: 8px 24px 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-green { background: #34c759; }
  .dot-yellow { background: #ff9500; }
  .dot-red { background: #ff3b30; }

  /* Calendar */
  .calendar { background: #fff; margin: 0 12px 12px; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #f9f9f9; border-bottom: 1px solid #eee; }
  .weekday { text-align: center; padding: 10px 0; font-size: 11px; font-weight: 600; color: #888; }
  .weekday:first-child { color: #ff3b30; }
  .weekday:last-child { color: #007aff; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day { position: relative; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
  .day:hover:not(.empty):not(.past) { background: #f5f5f5; border-radius: 8px; }
  .day.empty { cursor: default; }
  .day.past { opacity: 0.35; cursor: default; }
  .day-num { font-size: 14px; font-weight: 500; color: #222; line-height: 1; }
  .day.sunday .day-num { color: #ff3b30; }
  .day.saturday .day-num { color: #007aff; }
  .day.today .day-num { background: #222; color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
  .day-status { width: 6px; height: 6px; border-radius: 50%; margin-top: 3px; }
  .status-available { background: #34c759; }
  .status-conditional { background: #ff9500; }
  .status-unavailable { background: #ff3b30; }
  .day-note { font-size: 8px; color: #888; margin-top: 2px; text-align: center; line-height: 1.2; max-width: 38px; }

  /* Popup */
  .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: flex-end; justify-content: center; }
  .popup-overlay.show { display: flex; }
  .popup { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 24px 40px; width: 100%; max-width: 480px; animation: slideUp .25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .popup-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 20px; }
  .popup-date { font-size: 18px; font-weight: 700; color: #222; margin-bottom: 6px; }
  .popup-status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
  .badge-available { background: #e8f8ed; color: #1a9e3f; }
  .badge-conditional { background: #fff3e0; color: #e07000; }
  .badge-unavailable { background: #ffeaea; color: #d00; }
  .popup-note { font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.5; background: #f7f7f7; padding: 12px; border-radius: 10px; }
  .contact-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .contact-btn { flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 12px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .btn-phone { background: #e8f0fe; color: #1a73e8; }
  .btn-kakao { background: #fff3b0; color: #3a1d1d; }
  .btn-email { background: #f0f0f0; color: #333; }
  .contact-btn .icon { font-size: 20px; }
  .popup-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 22px; cursor: pointer; color: #aaa; }

  /* Admin panel */
  .admin-panel { display: none; background: #fff; margin: 0 12px 12px; border-radius: 16px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .admin-panel.show { display: block; }
  .admin-panel h3 { font-size: 15px; font-weight: 700; color: #222; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .admin-section { margin-bottom: 16px; }
  .admin-section label { font-size: 12px; color: #888; font-weight: 600; display: block; margin-bottom: 6px; }
  .admin-section input, .admin-section textarea { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 9px 12px; font-size: 14px; outline: none; font-family: inherit; }
  .admin-section input:focus, .admin-section textarea:focus { border-color: #667eea; }
  .admin-save-btn { width: 100%; padding: 12px; background: #667eea; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .admin-save-btn:hover { background: #5a6fd6; }
  .admin-toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .admin-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #aaa; margin-top: -4px; }

  /* Auth modal */
  .auth-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
  .auth-overlay.show { display: flex; }
  .auth-box { background: #fff; border-radius: 16px; padding: 28px 24px; width: 300px; text-align: center; }
  .auth-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .auth-box input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 16px; text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 14px; }
  .auth-box input:focus { border-color: #667eea; }
  .auth-btn { width: 100%; padding: 11px; background: #667eea; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .auth-cancel { margin-top: 10px; background: none; border: none; color: #aaa; font-size: 13px; cursor: pointer; }
  .auth-error { color: #ff3b30; font-size: 12px; margin-bottom: 8px; display: none; }

  /* Date edit popup (admin) */
  .edit-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 150; align-items: flex-end; justify-content: center; }
  .edit-popup-overlay.show { display: flex; }
  .edit-popup { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 24px 40px; width: 100%; max-width: 480px; animation: slideUp .25s ease; }
  .edit-popup-date { font-size: 17px; font-weight: 700; color: #222; margin-bottom: 16px; }
  .status-picker { display: flex; gap: 8px; margin-bottom: 14px; }
  .status-btn { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; }
  .status-btn.active-green { background: #e8f8ed; border-color: #34c759; color: #1a9e3f; }
  .status-btn.active-yellow { background: #fff3e0; border-color: #ff9500; color: #e07000; }
  .status-btn.active-red { background: #ffeaea; border-color: #ff3b30; color: #d00; }
  .status-btn:not(.active-green):not(.active-yellow):not(.active-red) { background: #f5f5f5; color: #888; }
  .edit-note { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 13px; font-family: inherit; resize: none; outline: none; margin-bottom: 14px; }
  .edit-note:focus { border-color: #667eea; }
  .edit-save-btn { width: 100%; padding: 13px; background: #222; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="avatar" id="avatarBtn">유</div>
    <div class="header-info">
      <h1>강사 일정 확인</h1>
      <p id="headerSub">문의 전 가능 여부를 먼저 확인해주세요</p>
    </div>
  </div>
  <a id="checkerLink" href="checker.html" style="font-size:12px;color:#667eea;text-decoration:none;font-weight:600;">자가진단 →</a>
</div>

<!-- Calendar nav -->
<div class="cal-nav">
  <button class="nav-btn" id="prevBtn">‹</button>
  <h2 id="calTitle"></h2>
  <button class="nav-btn" id="nextBtn">›</button>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-green"></div> 강의 가능</div>
  <div class="legend-item"><div class="legend-dot dot-yellow"></div> 협의 필요</div>
  <div class="legend-item"><div class="legend-dot dot-red"></div> 강의 불가능</div>
</div>

<!-- Calendar -->
<div class="calendar">
  <div class="weekdays">
    <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
    <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
  </div>
  <div class="days" id="daysGrid"></div>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
  <h3>🔐 관리자 설정 <button class="admin-close" id="adminClose">×</button></h3>
  <div class="admin-section">
    <label>이름 / 직함</label>
    <input type="text" id="adminName" placeholder="예: 유진 강사">
  </div>
  <div class="admin-section">
    <label>전화번호</label>
    <input type="tel" id="adminPhone" placeholder="010-0000-0000">
  </div>
  <div class="admin-section">
    <label>카카오 오픈채팅 URL</label>
    <input type="url" id="adminKakao" placeholder="https://open.kakao.com/...">
  </div>
  <div class="admin-section">
    <label>이메일</label>
    <input type="email" id="adminEmail" placeholder="example@email.com">
  </div>
  <div class="admin-section">
    <label>관리자 비밀번호 변경</label>
    <input type="password" id="adminNewPw" placeholder="새 비밀번호 (4자리)">
  </div>
  <button class="admin-save-btn" id="adminSaveBtn">저장</button>
</div>

<!-- Date View Popup (public) -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup" style="position:relative;">
    <button class="popup-close" id="popupClose">×</button>
    <div class="popup-handle"></div>
    <div class="popup-date" id="popupDate"></div>
    <div class="popup-status-badge" id="popupBadge"></div>
    <div class="popup-note" id="popupNote"></div>
    <div class="contact-btns" id="contactBtns"></div>
  </div>
</div>

<!-- Date Edit Popup (admin) -->
<div class="edit-popup-overlay" id="editPopupOverlay">
  <div class="edit-popup">
    <div class="popup-handle"></div>
    <div class="edit-popup-date" id="editPopupDate"></div>
    <div class="status-picker" id="statusPicker">
      <button class="status-btn" data-s="available">✅ 강의 가능</button>
      <button class="status-btn" data-s="conditional">🟡 협의 필요</button>
      <button class="status-btn" data-s="unavailable">❌ 강의 불가능</button>
    </div>
    <textarea class="edit-note" id="editNote" rows="3" placeholder="메모 (예: 오후 2시 이후 가능, 수도권만 가능 등)"></textarea>
    <button class="edit-save-btn" id="editSaveBtn">저장</button>
  </div>
</div>

<!-- Auth modal -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h3>🔐 관리자 로그인</h3>
    <div class="auth-error" id="authError">비밀번호가 틀렸어요</div>
    <input type="password" id="authInput" placeholder="비밀번호" maxlength="6">
    <button class="auth-btn" id="authConfirm">확인</button>
    <br><button class="auth-cancel" id="authCancel">취소</button>
  </div>
</div>

<script>
// ── 데이터 저장소 ──
const STORE_KEY = 'instructor_cal_v2';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveStore(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }

let store = loadStore();
if (!store.pw) store.pw = '1234';
if (!store.info) store.info = { name: '유진', phone: '', kakao: '', email: '' };
if (!store.overrides) store.overrides = {};  // { 'YYYY-MM-DD': { status, note } }
saveStore(store);

// ── 공휴일 (구글 캘린더 기반, 2026) ──
const HOLIDAYS = {
  '2026-05-01': '노동절',
  '2026-05-05': '어린이날',
  '2026-05-24': '부처님오신날',
  '2026-05-25': '부처님오신날 대체',
  '2026-06-03': '지방선거일',
  '2026-06-06': '현충일',
  '2026-07-17': '제헌절',
  '2026-08-15': '광복절',
  '2026-08-17': '광복절 대체',
  '2026-09-24': '추석 연휴',
  '2026-09-25': '추석',
  '2026-09-26': '추석 연휴',
  '2026-10-03': '개천절',
  '2026-10-05': '개천절 대체',
  '2026-10-09': '한글날',
  '2026-12-25': '크리스마스',
};

// ── 기본 규칙 (수동 override 없을 때) ──
function getDefaultStatus(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay(); // 0=일,6=토
  // 공휴일
  if (HOLIDAYS[dateStr]) return { status: 'unavailable', note: HOLIDAYS[dateStr] };
  // 토요일 오후 불가
  if (dow === 6) return { status: 'conditional', note: '오후 1시~5시 불가\n오전 협의 가능' };
  // 일요일
  if (dow === 0) return { status: 'unavailable', note: '일요일' };
  // 평일 기본 가능
  return { status: 'available', note: '강의 가능합니다' };
}

function getDayData(dateStr) {
  if (store.overrides[dateStr]) return store.overrides[dateStr];
  return getDefaultStatus(dateStr);
}

// ── 달력 렌더 ──
let currentYear, currentMonth;
const today = new Date();
currentYear = today.getFullYear();
currentMonth = today.getMonth();

function pad(n) { return String(n).padStart(2, '0'); }
function dateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

function renderCalendar() {
  const y = currentYear, m = currentMonth;
  document.getElementById('calTitle').textContent = `${y}년 ${m+1}월`;

  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  // empty cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = dateStr(y, m, d);
    const date = new Date(y, m, d);
    const dow = date.getDay();
    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());

    const { status, note } = getDayData(ds);

    const el = document.createElement('div');
    el.className = 'day' + (dow === 0 ? ' sunday' : '') + (dow === 6 ? ' saturday' : '') + (isPast ? ' past' : '');
    if (ds === dateStr(today.getFullYear(), today.getMonth(), today.getDate())) el.classList.add('today');

    el.innerHTML = `
      <div class="day-num">${d}</div>
      <div class="day-status status-${status}"></div>
      ${note && !isPast ? `<div class="day-note">${note.split('\n')[0].slice(0,8)}</div>` : ''}
    `;

    if (!isPast) {
      el.addEventListener('click', () => {
        if (isAdmin) openEditPopup(ds);
        else openPopup(ds);
      });
    }
    grid.appendChild(el);
  }
}

document.getElementById('prevBtn').onclick = () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); };
document.getElementById('nextBtn').onclick = () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };

// ── 공개 팝업 ──
function openPopup(ds) {
  const { status, note } = getDayData(ds);
  const d = new Date(ds + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('popupDate').textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;

  const badge = document.getElementById('popupBadge');
  if (status === 'available') { badge.textContent = '✅ 강의 가능'; badge.className = 'popup-status-badge badge-available'; }
  else if (status === 'conditional') { badge.textContent = '🟡 협의 필요'; badge.className = 'popup-status-badge badge-conditional'; }
  else { badge.textContent = '❌ 강의 불가능'; badge.className = 'popup-status-badge badge-unavailable'; }

  document.getElementById('popupNote').textContent = note || (status === 'available' ? '이 날 강의 문의를 보내주세요.' : '');

  const info = store.info;
  const btns = document.getElementById('contactBtns');
  btns.innerHTML = '';
  if (status !== 'unavailable') {
    const subject = encodeURIComponent(`[강의 문의] ${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`);
    if (info.phone) btns.innerHTML += `<button class="contact-btn btn-phone" onclick="location.href='tel:${info.phone}'"><span class="icon">📞</span>전화</button>`;
    if (info.kakao) btns.innerHTML += `<button class="contact-btn btn-kakao" onclick="window.open('${info.kakao}')"><span class="icon">💬</span>카카오</button>`;
    if (info.email) btns.innerHTML += `<button class="contact-btn btn-email" onclick="location.href='mailto:${info.email}?subject=${subject}'"><span class="icon">✉️</span>이메일</button>`;
    if (!info.phone && !info.kakao && !info.email) btns.innerHTML = `<p style="color:#aaa;font-size:13px;">연락처를 설정해주세요</p>`;
  }

  document.getElementById('popupOverlay').classList.add('show');
}

document.getElementById('popupClose').onclick = () => document.getElementById('popupOverlay').classList.remove('show');
document.getElementById('popupOverlay').onclick = (e) => { if (e.target === document.getElementById('popupOverlay')) document.getElementById('popupOverlay').classList.remove('show'); };

// ── 관리자 편집 팝업 ──
let editingDate = null;
let editingStatus = 'available';

function openEditPopup(ds) {
  editingDate = ds;
  const { status, note } = getDayData(ds);
  editingStatus = status;
  const d = new Date(ds + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('editPopupDate').textContent = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  document.getElementById('editNote').value = note || '';
  updateStatusBtns(status);
  document.getElementById('editPopupOverlay').classList.add('show');
}

function updateStatusBtns(s) {
  editingStatus = s;
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.className = 'status-btn';
    if (btn.dataset.s === s) {
      if (s === 'available') btn.classList.add('active-green');
      else if (s === 'conditional') btn.classList.add('active-yellow');
      else btn.classList.add('active-red');
    }
  });
}

document.querySelectorAll('.status-btn').forEach(btn => {
  btn.onclick = () => updateStatusBtns(btn.dataset.s);
});

document.getElementById('editSaveBtn').onclick = () => {
  const note = document.getElementById('editNote').value.trim();
  store.overrides[editingDate] = { status: editingStatus, note };
  saveStore(store);
  document.getElementById('editPopupOverlay').classList.remove('show');
  renderCalendar();
};

document.getElementById('editPopupOverlay').onclick = (e) => { if (e.target === document.getElementById('editPopupOverlay')) document.getElementById('editPopupOverlay').classList.remove('show'); };

// ── 관리자 인증 ──
let isAdmin = false;
let avatarTapCount = 0, avatarTapTimer = null;

document.getElementById('avatarBtn').addEventListener('click', () => {
  avatarTapCount++;
  clearTimeout(avatarTapTimer);
  avatarTapTimer = setTimeout(() => { avatarTapCount = 0; }, 600);
  if (avatarTapCount >= 3) {
    avatarTapCount = 0;
    if (isAdmin) { toggleAdmin(false); return; }
    document.getElementById('authInput').value = '';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authOverlay').classList.add('show');
    setTimeout(() => document.getElementById('authInput').focus(), 100);
  }
});

document.getElementById('authConfirm').onclick = () => {
  const pw = document.getElementById('authInput').value;
  if (pw === store.pw) {
    document.getElementById('authOverlay').classList.remove('show');
    toggleAdmin(true);
  } else {
    document.getElementById('authError').style.display = 'block';
    document.getElementById('authInput').value = '';
  }
};
document.getElementById('authInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authConfirm').click(); });
document.getElementById('authCancel').onclick = () => document.getElementById('authOverlay').classList.remove('show');

function toggleAdmin(on) {
  isAdmin = on;
  const panel = document.getElementById('adminPanel');
  if (on) {
    panel.classList.add('show');
    document.getElementById('headerSub').textContent = '🔐 관리자 모드 — 날짜를 눌러 상태 편집';
    loadAdminForm();
  } else {
    panel.classList.remove('show');
    document.getElementById('headerSub').textContent = '문의 전 가능 여부를 먼저 확인해주세요';
  }
}

document.getElementById('adminClose').onclick = () => toggleAdmin(false);

function loadAdminForm() {
  const i = store.info;
  document.getElementById('adminName').value = i.name || '';
  document.getElementById('adminPhone').value = i.phone || '';
  document.getElementById('adminKakao').value = i.kakao || '';
  document.getElementById('adminEmail').value = i.email || '';
  document.getElementById('adminNewPw').value = '';
}

document.getElementById('adminSaveBtn').onclick = () => {
  store.info.name = document.getElementById('adminName').value.trim() || '유진';
  store.info.phone = document.getElementById('adminPhone').value.trim();
  store.info.kakao = document.getElementById('adminKakao').value.trim();
  store.info.email = document.getElementById('adminEmail').value.trim();
  const newPw = document.getElementById('adminNewPw').value.trim();
  if (newPw.length >= 4) store.pw = newPw;
  saveStore(store);
  document.getElementById('headerSub').textContent = '✅ 저장됐어요! 날짜를 눌러 상태 편집';
  setTimeout(() => { if (isAdmin) document.getElementById('headerSub').textContent = '🔐 관리자 모드 — 날짜를 눌러 상태 편집'; }, 2000);
};

// ── Init ──
renderCalendar();
</script>
</body>
</html>
