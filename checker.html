<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 가능 자가진단</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; }

  .top-bar { background: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  .top-bar a { text-decoration: none; color: #555; font-size: 20px; }
  .top-bar h1 { font-size: 16px; font-weight: 700; color: #222; }
  .top-bar p { font-size: 12px; color: #888; }

  .chat-wrap { flex: 1; padding: 20px 16px 100px; display: flex; flex-direction: column; gap: 16px; max-width: 480px; margin: 0 auto; width: 100%; }

  /* Bubbles */
  .bubble-row { display: flex; gap: 10px; align-items: flex-end; }
  .bubble-row.user { justify-content: flex-end; }
  .bot-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .bubble { padding: 12px 16px; border-radius: 18px; max-width: 78%; font-size: 14px; line-height: 1.55; }
  .bubble.bot { background: #fff; color: #222; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .bubble.user { background: #667eea; color: #fff; border-bottom-right-radius: 4px; }

  /* Options */
  .options-row { display: flex; flex-wrap: wrap; gap: 8px; padding-left: 42px; }
  .opt-btn { padding: 9px 16px; border-radius: 20px; border: 1.5px solid #667eea; background: #fff; color: #667eea; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .opt-btn:hover { background: #667eea; color: #fff; }
  .opt-btn:disabled { border-color: #ddd; color: #aaa; background: #fafafa; cursor: default; }

  /* Date picker */
  .date-picker-wrap { padding-left: 42px; }
  .date-picker-inner { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.07); display: inline-block; }
  .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
  .date-nav button { background: none; border: 1px solid #ddd; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; }
  .date-nav span { font-size: 13px; font-weight: 700; color: #222; }
  .mini-cal { display: grid; grid-template-columns: repeat(7, 32px); gap: 2px; }
  .mini-cal .wday { text-align: center; font-size: 10px; color: #aaa; font-weight: 600; height: 20px; display: flex; align-items: center; justify-content: center; }
  .mini-cal .wday:first-child { color: #ff3b30; }
  .mini-cal .wday:last-child { color: #007aff; }
  .mini-cal .mday { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: #222; }
  .mini-cal .mday:hover:not(.unavail):not(.empty-cell):not(.past-day) { background: #eef; }
  .mini-cal .mday.unavail { color: #ddd; cursor: default; background: #fff8f8; border-radius: 4px; }
  .mini-cal .mday.past-day { color: #ccc; cursor: default; }
  .mini-cal .mday.empty-cell { cursor: default; }
  .mini-cal .mday.sunday { color: #ff3b30; }
  .mini-cal .mday.saturday { color: #007aff; }
  .mini-cal .mday.selected { background: #667eea !important; color: #fff !important; }
  .mini-cal .mday.today-mark { border: 2px solid #667eea; }

  /* Result */
  .result-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .result-status { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .result-detail { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 16px; }
  .contact-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .contact-btn { flex: 1; min-width: 70px; padding: 12px 6px; border-radius: 12px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .btn-phone { background: #e8f0fe; color: #1a73e8; }
  .btn-kakao { background: #fff3b0; color: #3a1d1d; }
  .btn-email { background: #f0f0f0; color: #333; }
  .icon { font-size: 18px; }
  .restart-btn { margin-top: 12px; width: 100%; padding: 11px; background: #f5f5f5; color: #555; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 14px 16px; }
  .typing span { width: 7px; height: 7px; background: #ccc; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
</style>
</head>
<body>

<div class="top-bar">
  <a href="availability.html">←</a>
  <div>
    <h1>강의 가능 자가진단</h1>
    <p>3단계로 바로 확인해요</p>
  </div>
</div>

<div class="chat-wrap" id="chatWrap"></div>

<script>
// ── 데이터 공유 (availability.html 과 동일 key) ──
const STORE_KEY = 'instructor_cal_v2';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
const store = loadStore();
const info = store.info || {};

const HOLIDAYS = {
  '2026-05-01':'노동절','2026-05-05':'어린이날','2026-05-24':'부처님오신날',
  '2026-05-25':'부처님오신날 대체','2026-06-03':'지방선거일','2026-06-06':'현충일',
  '2026-07-17':'제헌절','2026-08-15':'광복절','2026-08-17':'광복절 대체',
  '2026-09-24':'추석 연휴','2026-09-25':'추석','2026-09-26':'추석 연휴',
  '2026-10-03':'개천절','2026-10-05':'개천절 대체','2026-10-09':'한글날',
  '2026-12-25':'크리스마스',
};

function pad(n){ return String(n).padStart(2,'0'); }
function ds(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function getDayStatus(dateStr) {
  const overrides = store.overrides || {};
  if (overrides[dateStr]) return overrides[dateStr];
  const d = new Date(dateStr); const dow = d.getDay();
  if (HOLIDAYS[dateStr]) return { status:'unavailable', note: HOLIDAYS[dateStr] };
  if (dow===6) return { status:'conditional', note:'오후 1시~5시 불가, 오전 협의 가능' };
  if (dow===0) return { status:'unavailable', note:'일요일' };
  return { status:'available', note:'강의 가능합니다' };
}

// ── 상태 ──
let selectedDate = null, selectedType = null, selectedRegion = null;
let step = 0;
const wrap = document.getElementById('chatWrap');

function scrollBot() { setTimeout(()=>{ wrap.scrollTop = wrap.scrollHeight; },50); }

function addBotBubble(text, delay=300) {
  return new Promise(resolve => {
    // typing indicator
    const tRow = document.createElement('div');
    tRow.className = 'bubble-row';
    tRow.innerHTML = `<div class="bot-avatar">유</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>`;
    wrap.appendChild(tRow);
    scrollBot();
    setTimeout(()=>{
      tRow.remove();
      const row = document.createElement('div');
      row.className = 'bubble-row';
      row.innerHTML = `<div class="bot-avatar">유</div><div class="bubble bot">${text}</div>`;
      wrap.appendChild(row);
      scrollBot();
      resolve(row);
    }, delay);
  });
}

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'bubble-row user';
  row.innerHTML = `<div class="bubble user">${text}</div>`;
  wrap.appendChild(row);
  scrollBot();
}

function addOptions(opts, onSelect) {
  const row = document.createElement('div');
  row.className = 'options-row';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn'; btn.textContent = o.label;
    btn.onclick = () => {
      row.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      onSelect(o);
    };
    row.appendChild(btn);
  });
  wrap.appendChild(row);
  scrollBot();
  return row;
}

// ── 미니 달력 ──
let pickerYear, pickerMonth;
function addDatePicker(onSelect) {
  const today = new Date();
  pickerYear = today.getFullYear(); pickerMonth = today.getMonth();
  const wrap2 = document.createElement('div');
  wrap2.className = 'date-picker-wrap'; wrap2.id = 'datePicker';
  wrap2.innerHTML = `
    <div class="date-picker-inner">
      <div class="date-nav">
        <button id="dpPrev">‹</button>
        <span id="dpTitle"></span>
        <button id="dpNext">›</button>
      </div>
      <div class="mini-cal" id="dpGrid"></div>
    </div>`;
  wrap.appendChild(wrap2);
  scrollBot();

  function renderPicker() {
    const y=pickerYear, m=pickerMonth;
    document.getElementById('dpTitle').textContent = `${y}년 ${m+1}월`;
    const grid = document.getElementById('dpGrid');
    grid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(w=>{
      const d=document.createElement('div'); d.className='wday'; d.textContent=w; grid.appendChild(d);
    });
    const firstDow = new Date(y,m,1).getDay();
    const daysInM = new Date(y,m+1,0).getDate();
    for(let i=0;i<firstDow;i++){const e=document.createElement('div');e.className='mday empty-cell';grid.appendChild(e);}
    for(let d=1;d<=daysInM;d++){
      const dateStr2 = ds(y,m,d);
      const date = new Date(y,m,d);
      const dow = date.getDay();
      const isPast = date < new Date(today.getFullYear(),today.getMonth(),today.getDate());
      const { status } = getDayStatus(dateStr2);
      const unavail = status === 'unavailable';

      const el = document.createElement('div');
      el.className = 'mday' + (dow===0?' sunday':'') + (dow===6?' saturday':'') + (isPast?' past-day':'') + (unavail?' unavail':'');
      if(dateStr2 === ds(today.getFullYear(),today.getMonth(),today.getDate())) el.classList.add('today-mark');
      el.textContent = d;
      if (!isPast && !unavail) {
        el.onclick = () => {
          const days=['일','월','화','수','목','금','토'];
          selectedDate = dateStr2;
          const label = `${m+1}월 ${d}일 (${days[dow]})`;
          document.getElementById('datePicker').remove();
          addUserBubble(label);
          onSelect(dateStr2, label);
        };
      }
      grid.appendChild(el);
    }
  }

  document.getElementById('dpPrev').onclick = ()=>{ pickerMonth--; if(pickerMonth<0){pickerMonth=11;pickerYear--;} renderPicker(); };
  document.getElementById('dpNext').onclick = ()=>{ pickerMonth++; if(pickerMonth>11){pickerMonth=0;pickerYear++;} renderPicker(); };
  renderPicker();
}

// ── 결과 카드 ──
function showResult(dateStr2, dateLabel, type, region) {
  const { status, note } = getDayStatus(dateStr2);

  let resultTitle, resultMsg, canContact;
  if (status === 'unavailable') {
    resultTitle = '❌ 강의 불가능';
    resultMsg = `<b>${dateLabel}</b>은 ${note || '일정상 불가능한 날'}이에요.<br>다른 날짜로 다시 확인해주세요.`;
    canContact = false;
  } else if (status === 'conditional') {
    resultTitle = '🟡 협의 필요';
    resultMsg = `<b>${dateLabel}</b> ${note || ''}.<br>${type==='online'?'비대면 강의':'대면 강의'}으로 문의해 주시면 협의 가능해요.`;
    canContact = true;
  } else {
    resultTitle = '✅ 강의 가능';
    resultMsg = `<b>${dateLabel}</b> ${type==='online'?'비대면':'대면'} 강의 / ${region} 가능해요.<br>아래 채널로 문의 주세요 😊`;
    canContact = true;
  }

  const card = document.createElement('div');
  card.className = 'result-card';

  let btnsHtml = '';
  if (canContact) {
    const subject = encodeURIComponent(`[강의 문의] ${dateLabel}`);
    if (info.phone) btnsHtml += `<button class="contact-btn btn-phone" onclick="location.href='tel:${info.phone}'"><span class="icon">📞</span>전화</button>`;
    if (info.kakao) btnsHtml += `<button class="contact-btn btn-kakao" onclick="window.open('${info.kakao}')"><span class="icon">💬</span>카카오</button>`;
    if (info.email) btnsHtml += `<button class="contact-btn btn-email" onclick="location.href='mailto:${info.email}?subject=${subject}'"><span class="icon">✉️</span>이메일</button>`;
  }

  card.innerHTML = `
    <div class="result-status">${resultTitle}</div>
    <div class="result-detail">${resultMsg}</div>
    ${btnsHtml ? `<div class="contact-btns">${btnsHtml}</div>` : ''}
    <button class="restart-btn" id="restartBtn">🔄 다시 확인하기</button>
  `;

  const row = document.createElement('div');
  row.className = 'bubble-row';
  row.innerHTML = `<div class="bot-avatar">유</div>`;
  row.appendChild(card);
  wrap.appendChild(row);
  scrollBot();

  document.getElementById('restartBtn').onclick = () => {
    wrap.innerHTML = '';
    step = 0; selectedDate=null; selectedType=null; selectedRegion=null;
    startFlow();
  };
}

// ── 플로우 ──
async function startFlow() {
  await addBotBubble('안녕하세요! 👋<br>강의 가능 여부를 빠르게 확인해드릴게요.', 400);
  await addBotBubble('먼저, <b>희망하시는 날짜</b>를 선택해주세요.', 600);
  addDatePicker(async (dateStr2, label) => {
    const { status } = getDayStatus(dateStr2);
    if (status === 'unavailable') {
      await addBotBubble(`😔 아쉽게도 <b>${label}</b>은 불가능한 날이에요.<br>다른 날짜를 선택해주세요.`, 400);
      addDatePicker(async(ds2, lb2) => continueFromDate(ds2, lb2));
    } else {
      continueFromDate(dateStr2, label);
    }
  });
}

async function continueFromDate(dateStr2, label) {
  await addBotBubble(`<b>${label}</b> 확인했어요!<br>강의 형태가 어떻게 되나요?`, 500);
  addOptions([
    { label:'🏢 대면 강의', value:'offline' },
    { label:'💻 비대면(온라인)', value:'online' },
  ], async (o) => {
    selectedType = o.value;
    addUserBubble(o.label);
    await addBotBubble('어느 지역에서 진행되나요?', 500);
    addOptions([
      { label:'서울', value:'서울' },
      { label:'경기/인천', value:'경기·인천' },
      { label:'지방', value:'지방' },
      { label:'온라인', value:'온라인(무관)' },
    ], async (r) => {
      selectedRegion = r.value;
      addUserBubble(r.label);
      await addBotBubble('확인 중이에요...', 600);
      showResult(dateStr2, label, selectedType, selectedRegion);
    });
  });
}

startFlow();
</script>
</body>
</html>
